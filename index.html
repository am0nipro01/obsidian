<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="alternate icon" href="/favicon.svg" />

    <!-- Base meta (overridden per-page by react-helmet-async) -->
    <title>OBSIDIAN</title>
    <meta name="description" content="OBSIDIAN — Location de véhicules premium en France. Berlines de luxe, SUV et sportives avec service conciergerie." />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#0C0C0C" />

    <!-- Open Graph base -->
    <meta property="og:site_name" content="OBSIDIAN" />
    <meta property="og:type"      content="website" />
    <meta property="og:title"     content="OBSIDIAN — Location de véhicules premium" />
    <meta property="og:description" content="Location de véhicules de luxe en France. Berlines, SUV et sportives avec service conciergerie." />
    <meta property="og:image"     content="https://obsidian-rental.com/og-image.svg" />
    <meta property="og:locale"    content="fr_FR" />

    <!-- Twitter Card base -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:title"       content="OBSIDIAN — Location de véhicules premium" />
    <meta name="twitter:description" content="Location de véhicules de luxe en France." />
    <meta name="twitter:image"       content="https://obsidian-rental.com/og-image.svg" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  </head>
